<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldShare - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080B10;
            --card-bg: rgba(13, 17, 28, 0.7);
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --secondary: #7C3AED;
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --border-color: rgba(255, 255, 255, 0.06);
            --glow-color: rgba(124, 58, 237, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1E1B4B 0%, var(--bg-color) 70%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Abstract dynamic grid overlay */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            top: 0; left: 0;
            z-index: 0;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 1;
            opacity: 0.35;
            animation: float 10s ease-in-out infinite alternate;
        }
        .shape-1 {
            width: 500px;
            height: 500px;
            background: var(--primary);
            top: -150px;
            left: -150px;
        }
        .shape-2 {
            width: 400px;
            height: 400px;
            background: var(--secondary);
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 30px) scale(1.15); }
        }

        .auth-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 3rem 2.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            backdrop-filter: blur(24px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2.25rem;
        }

        .header h1 {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #E0E7FF 0%, #C7D2FE 30%, #818CF8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #C7D2FE;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1.1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .form-group input::placeholder {
            color: #4B5563;
        }

        .form-group input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px var(--glow-color);
            background: rgba(15, 23, 42, 0.85);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
            margin-top: 0.75rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .footer-link {
            text-align: center;
            margin-top: 1.75rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .footer-link a {
            color: #818CF8;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .footer-link a:hover {
            color: #A5B4FC;
            text-decoration: underline;
        }

        .overlay-loader {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(8, 11, 16, 0.9);
            z-index: 100;
            border-radius: 28px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            backdrop-filter: blur(4px);
        }

        .spinner {
            width: 44px; height: 44px;
            border: 4px solid rgba(255,255,255,0.05);
            border-top: 4px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1.25rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script src="/static/js/crypto-helper.js"></script>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <!-- Recovery Key Modal -->
    <div id="recovery-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(12px);">
        <div style="background: #0D111C; border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; padding: 2.5rem; max-width: 460px; width: 90%; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.7);">
            <h2 style="font-size: 1.6rem; font-weight: 800; margin-bottom: 1rem; color: #F3F4F6; letter-spacing: -0.5px;">🔑 Save Recovery Key</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.75rem; line-height: 1.6;">If you lose your password, this is the **ONLY** way to restore your cryptographic vault. Write it down; it cannot be recovered if lost.</p>
            <div id="recovery-key-display" style="background: rgba(0,0,0,0.4); border: 1px dashed #7C3AED; color: #A78BFA; font-family: monospace; font-size: 1.35rem; font-weight: 700; padding: 1.1rem; border-radius: 16px; margin-bottom: 1.75rem; letter-spacing: 2px; user-select: all; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);">XXXX-XXXX-XXXX-XXXX</div>
            <div style="display: flex; gap: 1rem;">
                <button type="button" id="copy-btn" style="flex: 1; padding: 0.85rem; background: #7C3AED; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s;">Copy to Clipboard</button>
                <button type="button" id="confirm-btn" style="flex: 1; padding: 0.85rem; background: #10B981; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s;" disabled>I Saved It</button>
            </div>
        </div>
    </div>

    <div class="auth-container">
        <div class="overlay-loader" id="loader">
            <div class="spinner"></div>
            <div id="loader-text">Generating cryptographic keys...</div>
        </div>

        <div class="header">
            <h1>ShieldShare</h1>
            <p>Create your secure cryptographic vault</p>
        </div>

        <form id="register-form" action="/register" method="POST">
            <input type="hidden" name="public_key" id="pub_key_input">
            <input type="hidden" name="encrypted_private_key" id="enc_priv_key_input">
            <input type="hidden" name="private_key_salt" id="salt_input">
            <input type="hidden" name="recovery_private_key" id="recovery_priv_key_input">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username">
                <span id="username-status" style="display: block; font-size: 0.8rem; margin-top: 0.4rem; font-weight: 600;"></span>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Master Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="new-password">
                <div class="password-strength-container" style="margin-top: 0.5rem; display: none;">
                    <div style="display: flex; gap: 4px; margin-bottom: 0.35rem;">
                        <div class="bar" id="bar-1" style="flex: 1; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.1); transition: background 0.3s;"></div>
                        <div class="bar" id="bar-2" style="flex: 1; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.1); transition: background 0.3s;"></div>
                        <div class="bar" id="bar-3" style="flex: 1; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.1); transition: background 0.3s;"></div>
                    </div>
                    <span id="password-strength-text" style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted);"></span>
                </div>
            </div>

            <button type="submit" class="btn-submit">Generate Cryptographic Vault</button>
        </form>

        <div class="footer-link">
            Already have a vault? <a href="/login">Unlock Vault</a>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById('username');
        const statusSpan = document.getElementById('username-status');
        const submitBtn = document.querySelector('.btn-submit');
        let usernameTimeout = null;

        // AJAX username availability check
        usernameInput.addEventListener('input', () => {
            clearTimeout(usernameTimeout);
            const username = usernameInput.value.trim();

            if (!username) {
                statusSpan.innerText = '';
                return;
            }

            statusSpan.innerText = 'Checking availability...';
            statusSpan.style.color = '#9CA3AF';

            usernameTimeout = setTimeout(() => {
                fetch(`/check-username?username=${encodeURIComponent(username)}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.exists) {
                            statusSpan.innerText = 'Username already exists';
                            statusSpan.style.color = '#EF4444';
                            submitBtn.disabled = true;
                            submitBtn.style.opacity = '0.5';
                            submitBtn.style.cursor = 'not-allowed';
                        } else {
                            statusSpan.innerText = 'Username is available';
                            statusSpan.style.color = '#10B981';
                            submitBtn.disabled = false;
                            submitBtn.style.opacity = '1';
                            submitBtn.style.cursor = 'pointer';
                        }
                    })
                    .catch(err => {
                        console.error('Error checking username:', err);
                        statusSpan.innerText = '';
                    });
            }, 300);
        });

        // Password Strength Indicator
        const passwordInput = document.getElementById('password');
        const strengthContainer = document.querySelector('.password-strength-container');
        const strengthText = document.getElementById('password-strength-text');
        const bar1 = document.getElementById('bar-1');
        const bar2 = document.getElementById('bar-2');
        const bar3 = document.getElementById('bar-3');

        passwordInput.addEventListener('input', () => {
            const pwd = passwordInput.value;
            if (!pwd) {
                strengthContainer.style.display = 'none';
                return;
            }
            strengthContainer.style.display = 'block';
            
            let score = 0;
            if (pwd.length >= 6) score++;
            if (/[A-Z]/.test(pwd) && /[0-9]/.test(pwd)) score++;
            if (/[^A-Za-z0-9]/.test(pwd)) score++;
            
            if (pwd.length < 6) {
                strengthText.innerText = 'Too short (min 6 characters)';
                strengthText.style.color = '#EF4444';
                bar1.style.background = '#EF4444';
                bar2.style.background = 'rgba(255,255,255,0.1)';
                bar3.style.background = 'rgba(255,255,255,0.1)';
            } else if (score === 1) {
                strengthText.innerText = 'Weak Password';
                strengthText.style.color = '#F59E0B';
                bar1.style.background = '#F59E0B';
                bar2.style.background = 'rgba(255,255,255,0.1)';
                bar3.style.background = 'rgba(255,255,255,0.1)';
            } else if (score === 2) {
                strengthText.innerText = 'Good Password';
                strengthText.style.color = '#3B82F6';
                bar1.style.background = '#3B82F6';
                bar2.style.background = '#3B82F6';
                bar3.style.background = 'rgba(255,255,255,0.1)';
            } else {
                strengthText.innerText = 'Strong Cryptographic Password';
                strengthText.style.color = '#10B981';
                bar1.style.background = '#10B981';
                bar2.style.background = '#10B981';
                bar3.style.background = '#10B981';
            }
        });

        // Generate Recovery Phrase (16 char key)
        function generateRecoveryKey() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let key = '';
            for (let i = 0; i < 16; i++) {
                if (i > 0 && i % 4 === 0) key += '-';
                key += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return key;
        }

        // Form Submit interception
        const registerForm = document.getElementById('register-form');
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');
        
        const recoveryModal = document.getElementById('recovery-modal');
        const recoveryKeyDisplay = document.getElementById('recovery-key-display');
        const copyBtn = document.getElementById('copy-btn');
        const confirmBtn = document.getElementById('confirm-btn');

        let generatedRecoveryKey = '';

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = passwordInput.value;
            if (password.length < 6) {
                alert('Password must be at least 6 characters.');
                return;
            }

            loader.style.display = 'flex';
            loaderText.innerText = 'Generating cryptographic keys (RSA-2048)...';

            try {
                // 1. Generate RSA key pair
                const keys = await generateRSAKeyPair();
                
                loaderText.innerText = 'Deriving encryption keys...';
                // 2. Export public key to PEM
                const publicPEM = await exportPublicKeyPEM(keys.publicKey);
                
                // 3. Generate salt & derive key
                const salt = window.crypto.getRandomValues(new Uint8Array(16));
                const passwordDerivedKey = await deriveKeyFromPassword(password, salt);

                loaderText.innerText = 'Encrypting private vault key...';
                // 4. Encrypt private key with password derived key
                const encPrivKey = await encryptPrivateKey(keys.privateKey, passwordDerivedKey);

                // 5. Generate Recovery Key & encrypt private key with it
                generatedRecoveryKey = generateRecoveryKey();
                const recoveryDerivedKey = await deriveKeyFromPassword(generatedRecoveryKey, salt);
                const recoveryEncPrivKey = await encryptPrivateKey(keys.privateKey, recoveryDerivedKey);

                // Fill hidden inputs
                document.getElementById('pub_key_input').value = publicPEM;
                document.getElementById('enc_priv_key_input').value = encPrivKey;
                document.getElementById('salt_input').value = arrayBufferToBase64(salt.buffer);
                document.getElementById('recovery_priv_key_input').value = recoveryEncPrivKey;

                // Hide loader
                loader.style.display = 'none';

                // Display recovery modal
                recoveryKeyDisplay.innerText = generatedRecoveryKey;
                recoveryModal.style.display = 'flex';

            } catch (err) {
                console.error(err);
                alert('An error occurred during cryptographic key generation: ' + err.message);
                loader.style.display = 'none';
            }
        });

        // Copy button handler
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(generatedRecoveryKey).then(() => {
                copyBtn.innerText = 'Copied!';
                copyBtn.style.background = '#10B981';
                confirmBtn.removeAttribute('disabled');
                confirmBtn.style.cursor = 'pointer';
            }).catch(err => {
                alert('Failed to copy to clipboard. Please select the text and copy manually.');
                confirmBtn.removeAttribute('disabled');
                confirmBtn.style.cursor = 'pointer';
            });
        });

        // Confirm button handler
        confirmBtn.addEventListener('click', () => {
            registerForm.submit();
        });
    </script>
</body>
</html>
