<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldShare - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0B0F19;
            --card-bg: rgba(17, 24, 39, 0.7);
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --secondary: #7C3AED;
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --border-color: rgba(255, 255, 255, 0.08);
            --glow-color: rgba(79, 70, 229, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #1E1B4B 0%, var(--bg-color) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Abstract background shapes */
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 1;
            opacity: 0.5;
        }
        .shape-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            left: -100px;
        }
        .shape-2 {
            width: 300px;
            height: 300px;
            background: var(--secondary);
            bottom: -50px;
            right: -50px;
        }

        .auth-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #A5B4FC 0%, #C7D2FE 50%, #818CF8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: 0.2px;
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--glow-color);
            background: rgba(31, 41, 55, 0.8);
        }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .footer-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-link a {
            color: #818CF8;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .footer-link a:hover {
            color: #A5B4FC;
            text-decoration: underline;
        }

        .overlay-loader {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.8);
            z-index: 100;
            border-radius: 24px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script src="/static/js/crypto-helper.js"></script>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <!-- Recovery Key Modal -->
    <div id="recovery-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px);">
        <div style="background: #111827; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 2rem; max-width: 450px; width: 90%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: #F3F4F6;">⚠️ Save Your Recovery Key</h2>
            <p style="color: #9CA3AF; font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.5;">If you lose your password, this is the ONLY way to recover your vault files. Keep this safe; it cannot be recovered if lost.</p>
            <div id="recovery-key-display" style="background: rgba(0,0,0,0.3); border: 1px dashed #7C3AED; color: #A78BFA; font-family: monospace; font-size: 1.25rem; font-weight: 700; padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; letter-spacing: 2px; user-select: all;">XXXX-XXXX-XXXX-XXXX</div>
            <button type="button" id="copy-btn" style="padding: 0.75rem 1.5rem; background: #7C3AED; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-right: 0.5rem;">Copy to Clipboard</button>
            <button type="button" id="confirm-btn" style="padding: 0.75rem 1.5rem; background: #10B981; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s;" disabled>I Saved It</button>
        </div>
    </div>

    <div class="auth-container">
        <div class="overlay-loader" id="loader">
            <div class="spinner"></div>
            <div id="loader-text">Generating cryptographic keys...</div>
        </div>

        <div class="header">
            <h1>ShieldShare</h1>
            <p>Create your secure cryptographic vault</p>
        </div>

        <form id="register-form" action="/register" method="POST">
            <input type="hidden" name="public_key" id="pub_key_input">
            <input type="hidden" name="encrypted_private_key" id="enc_priv_key_input">
            <input type="hidden" name="private_key_salt" id="salt_input">
            <input type="hidden" name="recovery_private_key" id="recovery_priv_key_input">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username">
                <span id="username-status" style="display: block; font-size: 0.8rem; margin-top: 0.35rem; font-weight: 500;"></span>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Master Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="new-password">
            </div>

            <button type="submit" class="btn-submit">Generate Cryptographic Vault</button>
        </form>

        <div class="footer-link">
            Already have a vault? <a href="/login">Unlock Vault</a>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById('username');
        const statusSpan = document.getElementById('username-status');
        const submitBtn = document.querySelector('.btn-submit');
        let usernameTimeout = null;

        // AJAX username availability check
        usernameInput.addEventListener('input', () => {
            clearTimeout(usernameTimeout);
            const username = usernameInput.value.trim();

            if (!username) {
                statusSpan.innerText = '';
                return;
            }

            statusSpan.innerText = 'Checking availability...';
            statusSpan.style.color = '#9CA3AF';

            usernameTimeout = setTimeout(() => {
                fetch(`/check-username?username=${encodeURIComponent(username)}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.exists) {
                            statusSpan.innerText = 'Username already exists';
                            statusSpan.style.color = '#EF4444';
                            submitBtn.disabled = true;
                            submitBtn.style.opacity = '0.5';
                            submitBtn.style.cursor = 'not-allowed';
                        } else {
                            statusSpan.innerText = 'Username is available';
                            statusSpan.style.color = '#10B981';
                            submitBtn.disabled = false;
                            submitBtn.style.opacity = '1';
                            submitBtn.style.cursor = 'pointer';
                        }
                    })
                    .catch(err => {
                        console.error('Error checking username:', err);
                        statusSpan.innerText = '';
                    });
            }, 300);
        });

        // Generate Recovery Phrase (16 char key)
        function generateRecoveryKey() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let key = '';
            for (let i = 0; i < 16; i++) {
                if (i > 0 && i % 4 === 0) key += '-';
                key += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return key;
        }

        // Form Submit interception
        const registerForm = document.getElementById('register-form');
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');
        
        const recoveryModal = document.getElementById('recovery-modal');
        const recoveryKeyDisplay = document.getElementById('recovery-key-display');
        const copyBtn = document.getElementById('copy-btn');
        const confirmBtn = document.getElementById('confirm-btn');

        let generatedRecoveryKey = '';

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            if (password.length < 6) {
                alert('Password must be at least 6 characters.');
                return;
            }

            loader.style.display = 'flex';
            loaderText.innerText = 'Generating cryptographic keys (RSA-2048)...';

            try {
                // 1. Generate RSA key pair
                const keys = await generateRSAKeyPair();
                
                loaderText.innerText = 'Deriving encryption keys...';
                // 2. Export public key to PEM
                const publicPEM = await exportPublicKeyPEM(keys.publicKey);
                
                // 3. Generate salt & derive key
                const salt = window.crypto.getRandomValues(new Uint8Array(16));
                const passwordDerivedKey = await deriveKeyFromPassword(password, salt);

                loaderText.innerText = 'Encrypting private vault key...';
                // 4. Encrypt private key with password derived key
                const encPrivKey = await encryptPrivateKey(keys.privateKey, passwordDerivedKey);

                // 5. Generate Recovery Key & encrypt private key with it
                generatedRecoveryKey = generateRecoveryKey();
                const recoveryDerivedKey = await deriveKeyFromPassword(generatedRecoveryKey, salt);
                const recoveryEncPrivKey = await encryptPrivateKey(keys.privateKey, recoveryDerivedKey);

                // Fill hidden inputs
                document.getElementById('pub_key_input').value = publicPEM;
                document.getElementById('enc_priv_key_input').value = encPrivKey;
                document.getElementById('salt_input').value = arrayBufferToBase64(salt.buffer);
                document.getElementById('recovery_priv_key_input').value = recoveryEncPrivKey;

                // Hide loader
                loader.style.display = 'none';

                // Display recovery modal
                recoveryKeyDisplay.innerText = generatedRecoveryKey;
                recoveryModal.style.display = 'flex';

            } catch (err) {
                console.error(err);
                alert('An error occurred during cryptographic key generation: ' + err.message);
                loader.style.display = 'none';
            }
        });

        // Copy button handler
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(generatedRecoveryKey).then(() => {
                copyBtn.innerText = 'Copied!';
                copyBtn.style.background = '#10B981';
                confirmBtn.removeAttribute('disabled');
                confirmBtn.style.cursor = 'pointer';
            }).catch(err => {
                alert('Failed to copy to clipboard. Please select the text and copy manually.');
                confirmBtn.removeAttribute('disabled');
                confirmBtn.style.cursor = 'pointer';
            });
        });

        // Confirm button handler
        confirmBtn.addEventListener('click', () => {
            // Finally submit the form to the server!
            registerForm.submit();
        });
    </script>
</body>
</html>
