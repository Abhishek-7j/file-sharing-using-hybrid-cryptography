<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldShare - Restore Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080B10;
            --card-bg: rgba(13, 17, 28, 0.7);
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --secondary: #7C3AED;
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --border-color: rgba(255, 255, 255, 0.06);
            --glow-color: rgba(124, 58, 237, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #1E1B4B 0%, var(--bg-color) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Abstract dynamic grid overlay */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            top: 0; left: 0;
            z-index: 0;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 1;
            opacity: 0.35;
            animation: float 10s ease-in-out infinite alternate;
        }
        .shape-1 {
            width: 500px;
            height: 500px;
            background: var(--primary);
            top: -150px;
            left: -150px;
        }
        .shape-2 {
            width: 400px;
            height: 400px;
            background: var(--secondary);
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 30px) scale(1.15); }
        }

        .auth-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 3rem 2.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            backdrop-filter: blur(24px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2.25rem;
        }

        .header h1 {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #E0E7FF 0%, #C7D2FE 30%, #818CF8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #C7D2FE;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1.1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .form-group input::placeholder {
            color: #4B5563;
        }

        .form-group input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px var(--glow-color);
            background: rgba(15, 23, 42, 0.85);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
            margin-top: 0.75rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #FCA5A5;
            padding: 0.85rem 1.1rem;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            text-align: center;
            display: none;
        }

        .footer-link {
            text-align: center;
            margin-top: 1.75rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .footer-link a {
            color: #818CF8;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .footer-link a:hover {
            color: #A5B4FC;
            text-decoration: underline;
        }

        .overlay-loader {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(8, 11, 16, 0.9);
            z-index: 100;
            border-radius: 28px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            backdrop-filter: blur(4px);
        }

        .spinner {
            width: 44px; height: 44px;
            border: 4px solid rgba(255,255,255,0.05);
            border-top: 4px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1.25rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script src="/static/js/crypto-helper.js"></script>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="auth-container">
        <div class="overlay-loader" id="loader">
            <div class="spinner"></div>
            <div id="loader-text">Decrypting vault private key...</div>
        </div>

        <div class="header">
            <h1>ShieldShare</h1>
            <p>Restore cryptographic vault access</p>
        </div>

        <div class="error-message" id="error-box"></div>

        <form id="recover-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="recovery_key">Recovery Key</label>
                <input type="text" id="recovery_key" name="recovery_key" placeholder="XXXX-XXXX-XXXX-XXXX" required>
            </div>

            <div class="form-group">
                <label for="new_password">New Master Password</label>
                <input type="password" id="new_password" name="new_password" placeholder="••••••••" required autocomplete="new-password">
            </div>

            <button type="submit" class="btn-submit">Restore & Reset Password</button>
        </form>

        <div class="footer-link">
            Remembered password? <a href="/login">Unlock Vault</a>
        </div>
    </div>

    <script>
        const recoverForm = document.getElementById('recover-form');
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');
        const errorBox = document.getElementById('error-box');

        recoverForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.style.display = 'none';
            loader.style.display = 'flex';
            loaderText.innerText = 'Fetching challenge...';

            const username = document.getElementById('username').value.trim();
            const recoveryKey = document.getElementById('recovery_key').value.trim().toUpperCase();
            const newPassword = document.getElementById('new_password').value;

            try {
                // 1. Get recovery challenge
                const challengeResponse = await fetch('/get-recovery-challenge');
                const challengeData = await challengeResponse.json();
                const challenge = challengeData.challenge;

                loaderText.innerText = 'Retrieving encrypted vault metadata...';
                
                // 2. Fetch recovery payload (encrypted key + salt)
                const payloadResponse = await fetch(`/get-recovery-payload?username=${encodeURIComponent(username)}`);
                if (!payloadResponse.ok) {
                    const errorData = await payloadResponse.json();
                    throw new Error(errorData.message || 'User vault not found.');
                }
                const payloadData = await payloadResponse.json();

                loaderText.innerText = 'Deriving recovery key...';

                // 3. Derive key from Recovery Key + salt
                const saltBuffer = base64ToArrayBuffer(payloadData.private_key_salt);
                const recoveryDerivedKey = await deriveKeyFromPassword(recoveryKey, saltBuffer);

                loaderText.innerText = 'Decrypting vault private key...';

                // 4. Decrypt private key with recovery key
                let privateKey;
                try {
                    privateKey = await decryptPrivateKey(payloadData.recovery_private_key, recoveryDerivedKey);
                } catch (decErr) {
                    throw new Error('Invalid Recovery Key. Decryption failed.');
                }

                loaderText.innerText = 'Signing server challenge...';

                // 5. Sign the challenge with the decrypted private key to prove ownership
                const encoder = new TextEncoder();
                const challengeBuffer = encoder.encode(challenge);
                const signatureBuffer = await window.crypto.subtle.sign(
                    { name: "RSASSA-PKCS1-v1_5" },
                    privateKey,
                    challengeBuffer
                );
                const signatureBase64 = arrayBufferToBase64(signatureBuffer);

                loaderText.innerText = 'Encrypting private key with new password...';

                // 6. Re-encrypt private key with new password-derived key
                const newPasswordDerivedKey = await deriveKeyFromPassword(newPassword, saltBuffer);
                const newEncryptedPrivateKey = await encryptPrivateKey(privateKey, newPasswordDerivedKey);

                loaderText.innerText = 'Uploading new credentials...';

                // 7. Submit recovery request
                const recoverResponse = await fetch('/recover', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username,
                        challenge: challenge,
                        signature: signatureBase64,
                        new_encrypted_private_key: newEncryptedPrivateKey,
                        new_password: newPassword
                    })
                });

                const recoverData = await recoverResponse.json();
                if (!recoverResponse.ok || recoverData.status !== 'success') {
                    throw new Error(recoverData.message || 'Vault restoration failed.');
                }

                alert('Vault restored successfully! Please log in with your new password.');
                window.location.href = '/login';

            } catch (err) {
                console.error(err);
                errorBox.innerText = err.message;
                errorBox.style.display = 'block';
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
