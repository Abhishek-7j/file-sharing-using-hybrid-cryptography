<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldShare - Restore Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0B0F19;
            --card-bg: rgba(17, 24, 39, 0.7);
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --secondary: #7C3AED;
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --border-color: rgba(255, 255, 255, 0.08);
            --glow-color: rgba(79, 70, 229, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #1E1B4B 0%, var(--bg-color) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Abstract background shapes */
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 1;
            opacity: 0.5;
        }
        .shape-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            left: -100px;
        }
        .shape-2 {
            width: 300px;
            height: 300px;
            background: var(--secondary);
            bottom: -50px;
            right: -50px;
        }

        .auth-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #A5B4FC 0%, #C7D2FE 50%, #818CF8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: 0.2px;
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--glow-color);
            background: rgba(31, 41, 55, 0.8);
        }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #FCA5A5;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            text-align: center;
            display: none;
        }

        .footer-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-link a {
            color: #818CF8;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .footer-link a:hover {
            color: #A5B4FC;
            text-decoration: underline;
        }

        .overlay-loader {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.8);
            z-index: 100;
            border-radius: 24px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script src="/static/js/crypto-helper.js"></script>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="auth-container">
        <div class="overlay-loader" id="loader">
            <div class="spinner"></div>
            <div id="loader-text">Decrypting vault private key...</div>
        </div>

        <div class="header">
            <h1>ShieldShare</h1>
            <p>Restore cryptographic vault access</p>
        </div>

        <div class="error-message" id="error-box"></div>

        <form id="recover-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="recovery_key">Recovery Key</label>
                <input type="text" id="recovery_key" name="recovery_key" placeholder="XXXX-XXXX-XXXX-XXXX" required>
            </div>

            <div class="form-group">
                <label for="new_password">New Master Password</label>
                <input type="password" id="new_password" name="new_password" placeholder="••••••••" required autocomplete="new-password">
            </div>

            <button type="submit" class="btn-submit">Restore & Reset Password</button>
        </form>

        <div class="footer-link">
            Remembered password? <a href="/login">Unlock Vault</a>
        </div>
    </div>

    <script>
        const recoverForm = document.getElementById('recover-form');
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');
        const errorBox = document.getElementById('error-box');

        recoverForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.style.display = 'none';
            loader.style.display = 'flex';
            loaderText.innerText = 'Fetching challenge...';

            const username = document.getElementById('username').value.trim();
            const recoveryKey = document.getElementById('recovery_key').value.trim().toUpperCase();
            const newPassword = document.getElementById('new_password').value;

            try {
                // 1. Get recovery challenge
                const challengeResponse = await fetch('/get-recovery-challenge');
                const challengeData = await challengeResponse.json();
                const challenge = challengeData.challenge;

                loaderText.innerText = 'Retrieving encrypted vault metadata...';
                
                // 2. Fetch recovery payload (encrypted key + salt)
                const payloadResponse = await fetch(`/get-recovery-payload?username=${encodeURIComponent(username)}`);
                if (!payloadResponse.ok) {
                    const errorData = await payloadResponse.json();
                    throw new Error(errorData.message || 'User vault not found.');
                }
                const payloadData = await payloadResponse.json();

                loaderText.innerText = 'Deriving recovery key...';

                // 3. Derive key from Recovery Key + salt
                const saltBuffer = base64ToArrayBuffer(payloadData.private_key_salt);
                const recoveryDerivedKey = await deriveKeyFromPassword(recoveryKey, saltBuffer);

                loaderText.innerText = 'Decrypting vault private key...';

                // 4. Decrypt private key with recovery key
                let privateKey;
                try {
                    privateKey = await decryptPrivateKey(payloadData.recovery_private_key, recoveryDerivedKey);
                } catch (decErr) {
                    throw new Error('Invalid Recovery Key. Decryption failed.');
                }

                loaderText.innerText = 'Signing server challenge...';

                // 5. Sign the challenge with the decrypted private key to prove ownership
                // Sign challenge string using RSASSA-PKCS1-v1_5
                const encoder = new TextEncoder();
                const challengeBuffer = encoder.encode(challenge);
                const signatureBuffer = await window.crypto.subtle.sign(
                    { name: "RSASSA-PKCS1-v1_5" },
                    privateKey,
                    challengeBuffer
                );
                const signatureBase64 = arrayBufferToBase64(signatureBuffer);

                loaderText.innerText = 'Encrypting private key with new password...';

                // 6. Re-encrypt private key with new password-derived key
                const newPasswordDerivedKey = await deriveKeyFromPassword(newPassword, saltBuffer);
                const newEncryptedPrivateKey = await encryptPrivateKey(privateKey, newPasswordDerivedKey);

                loaderText.innerText = 'Uploading new credentials...';

                // 7. Submit recovery request
                const recoverResponse = await fetch('/recover', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username,
                        challenge: challenge,
                        signature: signatureBase64,
                        new_encrypted_private_key: newEncryptedPrivateKey,
                        new_password: newPassword // server hashes this to check credentials during next logins
                    })
                });

                const recoverData = await recoverResponse.json();
                if (!recoverResponse.ok || recoverData.status !== 'success') {
                    throw new Error(recoverData.message || 'Vault restoration failed.');
                }

                alert('Vault restored successfully! Please log in with your new password.');
                window.location.href = '/login';

            } catch (err) {
                console.error(err);
                errorBox.innerText = err.message;
                errorBox.style.display = 'block';
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
